<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taller TypeScript 1</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="container mt-4">
    <div class="bg-info text-white p-2 mb-3 d-flex align-items-center">
      <img
        src="https://cdn-icons-png.flaticon.com/512/3163/3163478.png"
        alt="TV"
        width="30"
        class="me-2"
      />
      <h4 class="m-0">TV Series</h4>
    </div>

    <table class="table table-striped">
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Channel</th>
          <th>Seasons</th>
        </tr>
      </thead>
      <tbody id="series-table-body"></tbody>
    </table>

    <p id="average-seasons" class="fw-bold"></p>
  </div>

  <script type="module" src="./dist/main.js"></script>
</body>
</html>
